name: nanoplastic-scrnaseq
# Reproducible environment for the single-cell nanoplastic immune-response project.
# Create with:   conda env create -f environment.yml
# Activate with: conda activate nanoplastic-scrnaseq
# Register as a Jupyter kernel:
#   python -m ipykernel install --user --name nanoplastic-scrnaseq

channels:
  - conda-forge
  - bioconda

dependencies:
  - python=3.11
  - pip

  # --- core single-cell stack ---
  - scanpy=1.10.*          # main toolkit: QC, normalisation, clustering, DE
  - anndata=0.10.*         # the .h5ad data structure scanpy operates on
  - leidenalg              # Leiden clustering algorithm
  - python-igraph          # graph backend Leiden needs
  - harmonypy              # batch integration (step 2)

  # --- numeric / dataframes / plotting ---
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn

  # --- notebooks ---
  - jupyterlab
  - ipykernel

  # --- pip-only packages (not reliably on conda channels) ---
  - pip:
      - celltypist         # automated PBMC cell-type annotation (step 3, Azimuth alternative)
      - gseapy             # pathway enrichment GO/KEGG/Reactome (step 5)
      - decoupler          # pseudobulk + extra DE robustness (bonus analyses)
      - scikit-misc        # needed for the seurat_v3 HVG flavour
